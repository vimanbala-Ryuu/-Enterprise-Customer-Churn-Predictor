<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepRetain - Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: system-ui, -apple-system, sans-serif; }</style>
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen">
    <div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-gradient-to-br from-indigo-600 to-blue-600 rounded-xl mx-auto flex items-center justify-center text-white text-xl font-extrabold shadow-lg mb-4">D</div>
            <h2 class="text-2xl font-extrabold text-slate-800 tracking-tight">DeepRetain AI</h2>
            <p class="text-sm text-slate-500 mt-1">Enterprise Analytics Portal</p>
        </div>
        
        <form action="/" method="GET" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Corporate ID</label>
                <input type="text" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="admin" required>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Password</label>
                <input type="password" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white font-extrabold py-3 rounded-xl shadow-md hover:bg-indigo-700 transition mt-4">Secure Login</button>
        </form>
        
        <p class="text-center text-sm text-slate-500 mt-6 font-medium">New analyst? <a href="/register" class="text-indigo-600 hover:text-indigo-800">Request Access</a></p>
    </div>
</body>
</html>
