<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepRetain - Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: system-ui, -apple-system, sans-serif; }</style>
</head>
<body class="bg-[#f8f9fa] flex items-center justify-center h-screen text-[#202124] p-4">

    <div class="bg-white p-8 md:p-10 rounded-[2rem] shadow-sm border border-[#e8eaed] w-full max-w-md relative overflow-hidden">
        <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-[#1a73e8] to-blue-400"></div>

        <div class="text-center mb-8">
            <div class="w-14 h-14 bg-gradient-to-br from-[#1a73e8] to-blue-500 rounded-2xl mx-auto flex items-center justify-center text-white font-extrabold text-3xl mb-5 shadow-lg shadow-blue-200">D</div>
            <h2 class="text-2xl font-bold tracking-tight text-[#202124]">Welcome back</h2>
            <p class="text-[14px] text-[#5f6368] mt-1.5">Sign in to DeepRetain Intelligence</p>
        </div>

        {% if error %}
        <div class="bg-[#fce8e6] border border-[#f28b82] text-[#c5221f] px-4 py-3 rounded-xl text-[13px] font-bold mb-6 text-center animate-pulse">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label class="block text-[11px] font-bold text-[#5f6368] uppercase tracking-wider mb-2">Username</label>
                <input type="text" name="username" required class="w-full bg-[#f1f3f4] border border-[#dadce0] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#1a73e8] focus:ring-1 focus:ring-[#1a73e8] transition" placeholder="Enter your username">
            </div>
            
            <div>
                <label class="block text-[11px] font-bold text-[#5f6368] uppercase tracking-wider mb-2">Password</label>
                <input type="password" name="password" required class="w-full bg-[#f1f3f4] border border-[#dadce0] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#1a73e8] focus:ring-1 focus:ring-[#1a73e8] transition" placeholder="••••••••">
            </div>
            
            <button type="submit" class="w-full bg-[#1a73e8] text-white font-bold px-8 py-3.5 rounded-xl hover:bg-[#1557b0] transition shadow-sm mt-4">Access Dashboard</button>
        </form>

        <div class="mt-8 text-center text-[13px] text-[#5f6368] border-t border-[#e8eaed] pt-6">
            Don't have an account? <a href="/register" class="text-[#1a73e8] font-bold hover:underline transition">Create one</a>
        </div>
    </div>

</body>
</html>
