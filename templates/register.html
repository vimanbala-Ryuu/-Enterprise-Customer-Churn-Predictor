<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepRetain - Request Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: system-ui, -apple-system, sans-serif; }</style>
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen">
    <div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-extrabold text-slate-800 tracking-tight">Request Access</h2>
            <p class="text-sm text-slate-500 mt-1">Join the DeepRetain intelligence network</p>
        </div>
        
        <form action="/" method="GET" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Full Name</label>
                <input type="text" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Jane Doe" required>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Corporate Email</label>
                <input type="email" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="jane@enterprise.com" required>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Desired Password</label>
                <input type="password" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white font-extrabold py-3 rounded-xl shadow-md hover:bg-indigo-700 transition mt-4">Create Account</button>
        </form>
        
        <p class="text-center text-sm text-slate-500 mt-6 font-medium">Already deployed? <a href="/login" class="text-indigo-600 hover:text-indigo-800">Return to Login</a></p>
    </div>
</body>
</html>
